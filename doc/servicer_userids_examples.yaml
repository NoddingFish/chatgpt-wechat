---

# ============================================
# 配置说明
# ============================================
#
# ServicerUserID (字符串):
#   - 单个接待人员的 userid
#   - 用于向后兼容，仍然可以使用
#   - 当 ServicerUserIDs 未配置时生效
#
# ServicerUserIDs (字符串数组):
#   - 多个接待人员的 userid 列表
#   - 系统会自动轮询分配
#   - 优先级高于 ServicerUserID
#   - 第一次请求分配给第1个，第二次给第2个，以此循环
#
# ServiceState (整数):
#   - 2: 排队等待接待（推荐）
#       用户进入待接入池，任何可用客服都可接入
#   - 3: 直接指定接待
#       直接转给指定的客服，该客服必须处于"正在接待"状态
#
# 注意事项:
#   1. 所有配置的 userid 必须在企业微信中已激活
#   2. 当 ServiceState=3 时，客服必须处于"正在接待"状态
#   3. 第三方应用需要使用 open_userid（密文userid）
#   4. 轮询索引存储在 Redis 中，自动维护
#   5. 可以随时修改列表，重启后生效

---

# ============================================
# 测试配置是否正确
# ============================================
#
# 1. 启动服务后，查看日志确认配置加载成功
#    docker logs chatgpt-wechat | grep "配置信息"
#
# 2. 在企业微信中发送"人工客服"触发转人工
#
# 3. 观察日志中的轮询分配信息
#    docker logs chatgpt-wechat | grep "轮询分配"
#
# 4. 检查 Redis 中的索引
#    redis-cli GET chat:servicer:roundrobin:YOUR_OPEN_KF_ID
#
# 5. 连续发起多次请求，验证是否按顺序分配
