# 企业微信客服 - 多接待人员配置示例
# 
# 本文件展示了如何配置 ServicerUserIDs 实现轮询分配
# 复制相关配置到你的实际配置文件中

# ============================================
# 示例1: 基础轮询配置（推荐新手使用）
# ============================================
WeCom:
  Port: 8887
  CorpID: wwxxxxxxxxxxxxx
  Token: your_token
  EncodingAESKey: your_encoding_aes_key
  MultipleApplication:
    - AgentID: 1000001
      AgentSecret: your_agent_secret
      ManageAllKFSession: true
      Model: "gpt-3.5-turbo"
      BasePrompt: "你是ChatGPT助手"
      Welcome: "您好！我是AI助手"
      
      # 方式1: 多个客服轮询（新增功能，推荐）
      ServicerUserIDs:
        - "zhangsan"
        - "lisi"
        - "wangwu"
      
      # 排队等待模式（更灵活）
      ServiceState: 2

---

# ============================================
# 示例2: 直接指定模式 + 轮询分配
# ============================================
WeCom:
  MultipleApplication:
    - AgentID: 1000001
      AgentSecret: your_agent_secret
      ManageAllKFSession: true
      
      # 专属客服团队，直接指定
      ServicerUserIDs:
        - "vip_kefu_01"
        - "vip_kefu_02"
      
      # 直接指定接待（需要客服处于"正在接待"状态）
      ServiceState: 3

---

# ============================================
# 示例3: 兼容旧配置（单客服）
# ============================================
WeCom:
  MultipleApplication:
    - AgentID: 1000001
      AgentSecret: your_agent_secret
      ManageAllKFSession: true
      
      # 单个客服（旧方式，仍然可用）
      ServicerUserID: "kefu_manager"
      
      ServiceState: 3

---

# ============================================
# 示例4: 混合配置（新旧结合）
# ============================================
WeCom:
  MultipleApplication:
    - AgentID: 1000001
      AgentSecret: your_agent_secret
      ManageAllKFSession: true
      
      # 优先使用列表轮询
      ServicerUserIDs:
        - "kefu_a"
        - "kefu_b"
        - "kefu_c"
      
      # 备用配置（如果列表为空时使用）
      ServicerUserID: "default_kefu"
      
      ServiceState: 3

---

# ============================================
# 示例5: 多应用不同配置
# ============================================
WeCom:
  MultipleApplication:
    # 应用1: 普通客服 - 排队等待
    - AgentID: 1000001
      AgentSecret: secret_1
      ManageAllKFSession: true
      ServicerUserIDs:
        - "general_kefu_1"
        - "general_kefu_2"
      ServiceState: 2
    
    # 应用2: VIP客服 - 直接指定
    - AgentID: 1000002
      AgentSecret: secret_2
      ManageAllKFSession: true
      ServicerUserIDs:
        - "vip_kefu_1"
        - "vip_kefu_2"
      ServiceState: 3
    
    # 应用3: 专属客服 - 单人负责
    - AgentID: 1000003
      AgentSecret: secret_3
      ManageAllKFSession: false
      ServicerUserID: "exclusive_kefu"
      ServiceState: 3

---

# ============================================
# 示例6: 环境变量配置方式
# ============================================
# 如果使用环境变量而非 YAML 文件：
#
# WECOM_MULTIPLEAPPLICATION_0_SERVICERUSERIDS_0=zhangsan
# WECOM_MULTIPLEAPPLICATION_0_SERVICERUSERIDS_1=lisi
# WECOM_MULTIPLEAPPLICATION_0_SERVICERUSERIDS_2=wangwu
# WECOM_MULTIPLEAPPLICATION_0_SERVICESTATE=3
#
# 或者在 docker-compose.yml 中：
# environment:
#   - WECOM_MULTIPLEAPPLICATION_0_SERVICERUSERIDS_0=zhangsan
#   - WECOM_MULTIPLEAPPLICATION_0_SERVICERUSERIDS_1=lisi
#   - WECOM_MULTIPLEAPPLICATION_0_SERVICERUSERIDS_2=wangwu
#   - WECOM_MULTIPLEAPPLICATION_0_SERVICESTATE=3

---

